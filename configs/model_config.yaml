# Model Configuration
# 当前实验模型：Qwen3.5-4B（主力）和 Qwen3.5-9B（规模对比）

# 当前使用的模型
current_model: "qwen3.5-4b"

# 模型配置
models:
  qwen3.5-4b:
    name: "Qwen/Qwen3.5-4B"
    local_path: "/data/models/Qwen3.5-4B"
    hidden_size: 2560
    num_layers: 32
    # Hook 层位置：int(32 * 3/4) = 24，int(32 * 5/6) = 26
    hook_layers: [24, 26]
    # SAE 参数（由 hidden_size 推算）
    # dict_size = hidden_size * 8 = 20480
    # k = hidden_size // 32 = 80
    is_tool_tuned: true

  qwen3.5-9b:
    name: "Qwen/Qwen3.5-9B"
    local_path: "/data/models/Qwen3.5-9B"
    hidden_size: 4096
    num_layers: 32
    hook_layers: [24, 26]
    # dict_size = 32768, k = 128
    is_tool_tuned: true

# 推理配置
inference:
  max_new_tokens: 512
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  # Qwen3.5 thinking 模式：关闭保持决策边界干净
  thinking_budget: 0
  batch_size: 8
  device: "cuda"
  dtype: "bfloat16"
