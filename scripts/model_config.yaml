# Model Configuration
# 支持的模型：Llama-3-8B, Qwen-3-8B/14B, Gemma-3-4B/12B

# 当前使用的模型
current_model: "llama3-8b"

# 模型配置
models:
  llama3-8b:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    local_path: "/data/models/Llama-3.1-8B-Instruct"
    hidden_size: 4096
    num_layers: 32
    # Hook 层位置（3/4位置, Layer 0为第一层）
    hook_layer: 23
    # 残差流 hook 点名称
    hook_point: "model.layers.{layer}.post_attention_layernorm"
    # 是否为 tool-tuned 模型
    is_tool_tuned: true
  
  qwen3-4b:
    name: "Qwen/Qwen3-4B"
    local_path: "/data/models/Qwen3-4B"
    hidden_size: 2560
    num_layers: 36
    hook_layer: 26
    hook_point: "model.layers.{layer}.post_attention_layernorm"
    is_tool_tuned: true

  qwen3-8b:
    name: "Qwen/Qwen3-8B"
    local_path: "/data/models/Qwen3-8B"
    hidden_size: 4096
    num_layers: 36
    hook_layer: 26
    hook_point: "model.layers.{layer}.post_attention_layernorm"
    is_tool_tuned: true
    
  qwen3-14b:
    name: "Qwen/Qwen3-14B"
    local_path: "/data/models/Qwen3-14b"
    hidden_size: 5120
    num_layers: 40
    hook_layer: 29
    hook_point: "model.layers.{layer}.post_attention_layernorm"
    is_tool_tuned: true
    
  gemma3-4b:
    name: "google/gemma-3-4b-it"
    local_path: "/data/models/gemma-3-4b-it"
    hidden_size: 2560
    num_layers: 34
    hook_layer: 24
    hook_point: "language_model.model.layers.{layer}.post_attention_layernorm"
    is_tool_tuned: true
    
  gemma3-12b:
    name: "google/gemma-3-12b-it"
    local_path: "/data/models/gemma-3-12b-it"
    hidden_size: 4096
    num_layers: 48
    hook_layer: 35
    hook_point: "language_model.model.layers.{layer}.post_attention_layernorm"
    is_tool_tuned: true

# 推理配置
inference:
  max_new_tokens: 1024
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  # 使用 vLLM 加速（Linux 服务器推荐开启）
  use_vllm: false
  # 批量大小
  batch_size: 8
  # 设备配置
  device: "cuda"
  dtype: "bfloat16"
